name: Database Tests (tSQLt)

# This workflow expects tSQLt.class.sql and SetClrEnabled.sql to be committed
# under database/tsqlt/ (download both from https://tsqlt.org/downloads/ and
# drop them in that folder). Until those files are added, this workflow will
# fail at the "Install tSQLt" step with a clear file-not-found error.
#
# Also requires a repository secret CI_SQL_SA_PASSWORD (Settings > Secrets and
# variables > Actions) - a strong password used only inside this disposable
# CI container, unrelated to your real Azure SQL password.

on:
  workflow_dispatch: {}
# Auto-trigger on push disabled for now - this workflow needs manually-added
# tSQLt install files (see database/tsqlt/README.md) plus a CI_SQL_SA_PASSWORD
# secret before it can succeed, and it doesn't affect the live app either way
# (that's azure-deploy.yml). Run it manually via Actions > Database Tests >
# Run workflow once you're ready to finish the tSQLt setup.

jobs:
  tsqlt:
    runs-on: ubuntu-latest

    services:
      mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: 'Y'
          MSSQL_SA_PASSWORD: ${{ secrets.CI_SQL_SA_PASSWORD }}
        ports:
          - 1433:1433
        # No docker-level health check here on purpose - the exact sqlcmd
        # path inside this image varies by version/tag, and a health check
        # that can't even execute makes the whole service report as failed
        # rather than just "not ready yet". Waiting is done from the runner
        # side instead, in the step below.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install sqlcmd
        run: |
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y mssql-tools18 unixodbc-dev
          echo "/opt/mssql-tools18/bin" >> $GITHUB_PATH

      - name: Wait for SQL Server to accept connections
        run: |
          which sqlcmd
          sqlcmd -? | head -1
          for i in $(seq 1 30); do
            echo "--- Attempt $i/30 ---"
            sqlcmd -S localhost -U sa -P "${{ secrets.CI_SQL_SA_PASSWORD }}" -C -Q "SELECT 1" && { echo "SQL Server is ready."; exit 0; }
            sleep 5
          done
          echo "SQL Server did not become ready in time."
          exit 1

      - name: Create TestLeatherPOS database
        run: sqlcmd -S localhost -U sa -P "${{ secrets.CI_SQL_SA_PASSWORD }}" -C -Q "CREATE DATABASE TestLeatherPOS"

      - name: Deploy schema and stored procedures
        run: |
          for f in database/01_schema_phase1.sql database/02_sp_security.sql database/03_sp_customers.sql database/04_sp_items_uom.sql database/05_sp_containers.sql database/06_auth_bootstrap.sql database/07_gap_closure.sql database/08_schema_phase2.sql database/09_sp_billing.sql database/10_sp_payments.sql database/11_phase2_screens.sql; do
            sqlcmd -S localhost -U sa -P "${{ secrets.CI_SQL_SA_PASSWORD }}" -C -d TestLeatherPOS -i "$f"
          done

      - name: Install tSQLt
        run: |
          sqlcmd -S localhost -U sa -P "${{ secrets.CI_SQL_SA_PASSWORD }}" -C -d TestLeatherPOS -i database/tsqlt/PrepareServer.sql
          sqlcmd -S localhost -U sa -P "${{ secrets.CI_SQL_SA_PASSWORD }}" -C -d TestLeatherPOS -i database/tsqlt/tSQLt.class.sql

      - name: Run guard-rule tests
        run: |
          sqlcmd -S localhost -U sa -P "${{ secrets.CI_SQL_SA_PASSWORD }}" -C -d TestLeatherPOS -i database/tests/tSQLt_Phase1_GuardTests.sql
          sqlcmd -S localhost -U sa -P "${{ secrets.CI_SQL_SA_PASSWORD }}" -C -d TestLeatherPOS -i database/tests/tSQLt_Phase2_GuardTests.sql

      - name: Execute tSQLt.RunAll and fail on any test failure
        run: |
          sqlcmd -S localhost -U sa -P "${{ secrets.CI_SQL_SA_PASSWORD }}" -C -d TestLeatherPOS -Q "EXEC tSQLt.RunAll;"
          FAILED=$(sqlcmd -S localhost -U sa -P "${{ secrets.CI_SQL_SA_PASSWORD }}" -C -d TestLeatherPOS -h -1 -Q "SET NOCOUNT ON; SELECT COUNT(*) FROM tSQLt.TestResult WHERE Result <> 'Success';")
          echo "Failed tests: $FAILED"
          if [ "$(echo $FAILED | xargs)" != "0" ]; then exit 1; fi
